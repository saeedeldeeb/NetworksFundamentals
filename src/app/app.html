<div class="app-layout" [class.sidebar-closed]="!sidebarOpen()">
  <aside class="sidebar">
    <div class="sidebar-header">
      <a routerLink="/" class="logo">
        <span class="logo-icon">NF</span>
        <span class="logo-text">Network<br>Fundamentals</span>
      </a>
    </div>
    <nav class="sidebar-nav">
      @for (section of sections; track section.id) {
        @if (section.available) {
          <a
            class="nav-item"
            [routerLink]="section.path"
            routerLinkActive="active"
          >
            <span class="nav-number">{{ section.id.toString().padStart(2, '0') }}</span>
            <span class="nav-title">{{ section.title }}</span>
          </a>
        } @else {
          <span class="nav-item disabled">
            <span class="nav-number">{{ section.id.toString().padStart(2, '0') }}</span>
            <span class="nav-title">{{ section.title }}</span>
            <span class="nav-lock">Soon</span>
          </span>
        }
      }
    </nav>
  </aside>

  <main class="main-content">
    <button class="sidebar-toggle" (click)="toggleSidebar()">
      &#9776;
    </button>
    <router-outlet />
  </main>
</div>
